services:
  db:
    image: postgres:15
    container_name: music-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=musicdb
      - POSTGRES_USER=musicuser
      - POSTGRES_PASSWORD=musicpass
    volumes:
      - music_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicuser -d musicdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: richardeigenmann/musicbackend:latest-native
    container_name: music-backend
    restart: unless-stopped
    ports:
      - "8011:8002"
    environment:
      - SPRING_PROFILES_ACTIVE=qa
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/musicdb
      - SPRING_DATASOURCE_USERNAME=musicuser
      - SPRING_DATASOURCE_PASSWORD=musicpass
      - APP_CORS_ALLOWED_ORIGINS=http://octan:8010
    volumes:
      - /richi/mp3:/richi/mp3
      - /richi/ToDo:/richi/ToDo
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: richardeigenmann/musicfrontend:latest
    container_name: music-frontend
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      - BACKEND_URL=http://octan:8011
      - PORT=8010
    depends_on:
      - backend

volumes:
  music_db_data:
