services:
  db:
    image: postgres:15
    container_name: music-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=musicdb
      - POSTGRES_USER=musicuser
      - POSTGRES_PASSWORD=musicpass
    volumes:
      - music_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicuser -d musicdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: richardeigenmann/musicbackend:latest
    container_name: music-backend
    restart: unless-stopped
    ports:
      - "8011:8002"
    environment:
      - SPRING_PROFILES_ACTIVE=qa
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/musicdb?currentSchema=musicdatabase,public
      - SPRING_DATASOURCE_USERNAME=musicuser
      - SPRING_DATASOURCE_PASSWORD=musicpass
      - APP_CORS_ALLOWED_ORIGINS=http://octan:8010
      - SPRING_CONFIG_IMPORT_EXTRA=optional:file:/config/initial-data.yml
    volumes:
      - /richi/mp3:/mp3
      - /richi/ToDo:/admin
      - ./config:/config
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: richardeigenmann/musicfrontend:latest
    container_name: music-frontend
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      - BACKEND_URL=http://octan:8011
      - PORT=8010
    depends_on:
      - backend

  # disable this section if you don't want the PgAdmin database UI
  pgadmin:
    image: dpage/pgadmin4
    container_name: music-pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=adminpass
    ports:
      - "8012:80"
    depends_on:
      - db

volumes:
  music_db_data:
