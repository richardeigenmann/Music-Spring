@if (currentTrack(); as track) {
  <div class="player-bar">
    <div class="track-info">
      <img [src]="getTrackImageUrl(track.fileId)" alt="Cover" class="cover-art" (click)="openQueue()">
      <div class="track-details">
        <div class="track-title" [title]="track.title">{{ track.title }}</div>
        <div class="track-artist" [title]="track.artist">{{ track.artist }}</div>
      </div>
    </div>

    <div class="controls">
      <button class="control-btn" (click)="playbackService.previousTrack()" [disabled]="!hasPrevious()" title="Previous Track">
        ⏮
      </button>

      <!-- <audio #audioPlayer controls autoplay class="audio-element"></audio> -->
      <audio #audioPlayer
        [src]="getTrackUrl(track.fileId)"
        controls
        autoplay
        class="audio-element">
      </audio>

      <button class="control-btn" (click)="playbackService.nextTrack()" [disabled]="!hasNext()" title="Next Track">
        ⏭
      </button>
    </div>

    <div class="extra-controls">
      <button class="queue-btn" (click)="openQueue()">Queue</button>
    </div>
  </div>
}
