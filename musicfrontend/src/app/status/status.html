<div class="status-container">
  <h1>System Status</h1>
  
  <div class="status-item">
    <strong>Frontend URL:</strong> {{ frontendUrl() }}
  </div>
  
  <div class="status-item">
    <strong>Backend URL:</strong> {{ backendUrl() }}
  </div>
  
  <div class="status-item">
    <strong>Frontend Container Name:</strong> {{ containerName() }}
  </div>

  @if (versionInfo(); as info) {
    <div class="status-section">
      <h2>Backend Version Information</h2>
      <pre>{{ info | json }}</pre>
    </div>
  } @else {
    <div class="status-section">
      <p>Loading backend version info...</p>
    </div>
  }

  <div style="margin-top: 20px;">
    <button (click)="goBack()">Back</button>
  </div>
</div>
