<div class="groups-page">
  <div class="groups-container">
    @for (groupType of sortedGroupTypes(); track groupType) {
      <div class="group-type-section">
        <h2 class="type-header">{{ groupType }}</h2>
        <div class="groups-list">
          @for (group of groupedGroups()[groupType]; track group.groupId) {
            <span class="group-pill" (click)="selectGroup(group.groupId)">
              {{ group.groupName }}
            </span>
          }
        </div>
      </div>
    }
  </div>
</div>
