<ul class="track-list">
    @for (track of tracks(); track track.trackId) {
        <li [class.highlighted]="track.trackId === highlightId()" (click)="goToEdit(track.trackId)">
            <div class="art-container" (click)="playSingleTrack($event, track)" title="Play this track">
                <img [src]="getTrackImageUrl(track.fileId)" alt="Cover" class="list-cover" loading="lazy">
                <div class="play-overlay">▶</div>
            </div>

            <div class="track-info">
                <span class="track-artist">{{ track.artist }}</span>
                <span class="track-title">{{ track.title }}</span>
            </div>

            <div class="group-pills">
                @for (group of track.groupDetails; track group.groupId) {
                    <span class="group-pill"
                          [routerLink]="['/group', group.groupId]"
                          (click)="$event.stopPropagation()"
                          title="{{ group.groupTypeName }}">
                        {{ group.groupName }}
                    </span>
                }
            </div>
        </li>
    }
</ul>
