<div class="stats-container">
  <h1>Library Statistics</h1>

  <div class="detailed-stats" *ngIf="groupTypeCharts().length > 0">
    <div class="grid-container">
      <div class="chart-section" *ngFor="let chart of groupTypeCharts()">
        <h3>{{ chart.typeName }}</h3>
        <div class="chart-wrapper">
          <canvas baseChart
                  [data]="chart.data"
                  [options]="pieChartOptions"
                  [type]="pieChartType">
          </canvas>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="groupTypeCharts().length === 0" class="loading">
    Loading statistics...
  </div>
</div>
