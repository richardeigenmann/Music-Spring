<div class="background-box">
  <div class="header">
    <h1>{{ currentTagTitle() }}</h1>
    <div class="actions">
      <button class="play-all-btn" (click)="playAll()" title="Play All">
        <span class="play-icon"></span>
      </button>
      <div class="menu-container">
        <button class="menu-btn" (click)="toggleMenu($event)" title="More options">
          <span class="menu-icon"></span>
        </button>
        @if (showMenu()) {
          <div class="dropdown-menu" (click)="onDropdownClick($event)" (keydown)="onDropdownClick($event)" tabindex="-1" role="menu">
            <button (click)="downloadM3u()" class="menu-item-btn" role="menuitem">Download as .m3u</button>
            <button (click)="downloadZip()" class="menu-item-btn" role="menuitem">Download as .zip</button>
            <button (click)="deleteCurrentTag()" class="menu-item-btn" role="menuitem">Delete Tag</button>
          </div>
        }
      </div>
    </div>
  </div>

  <app-track-list [tracks]="playlistEntries()" [highlightId]="currentTrackId()"></app-track-list>
</div>
