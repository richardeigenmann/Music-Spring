<div class="background-box">
  <div class="header">
    <h1>{{ currentTagTitle() }}</h1>
    <div class="actions">
      <button class="play-all-btn" (click)="playAll()" title="Play All">
        <span class="play-icon"></span>
      </button>
      <div class="menu-container">
        <button class="menu-btn" (click)="toggleMenu($event)" title="More options">
          <span class="menu-icon"></span>
        </button>
        <div class="dropdown-menu" *ngIf="showMenu()" (click)="onDropdownClick($event)">
          <a (click)="downloadM3u()">Download as .m3u</a>
          <a (click)="downloadZip()">Download as .zip</a>
          <a (click)="deleteCurrentTag()">Delete Tag</a>
        </div>
      </div>
    </div>
  </div>

  <app-track-list [tracks]="playlistEntries()" [highlightId]="currentTrackId()"></app-track-list>
</div>
