<div class="background-box">
  <div class="header">
    <h1>Search: {{ query() }}</h1>
    <div class="actions">
      <button class="play-all-btn" (click)="playAll()" [disabled]="tracks().length === 0" title="Play All">
        <span class="play-icon"></span>
      </button>
    </div>
  </div>

  @if (tracks().length === 0) {
    <p>No tracks found matching your search.</p>
  } @else {
    <app-track-list [tracks]="tracks()" [highlightId]="currentTrackId()"></app-track-list>
  }
</div>
