<h1>Playlist Tracks {{groupId()}}</h1>
<button (click)="playAll()">Play All</button>
<ul>
  @for (entry of playlistEntries(); track entry.trackName) {
    <li>
      <a [routerLink]="['/track', entry.trackId]">{{ entry.trackName }} - {{ entry.artist }}</a>
      <a [routerLink]="['/track', entry.trackId]" style="text-decoration: none; margin-left: 5px;">✏️</a>
    </li>
  }
</ul>
