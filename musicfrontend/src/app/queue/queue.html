<div class="background-box">
    <div class="queue-header">
        <h1>{{ playlistName() }}</h1>
        <div class="queue-controls">
            <button class="nav-btn" (click)="playbackService.goBackHistory()" [disabled]="!canGoBack()">
                History Back
            </button>
            <button class="nav-btn" (click)="playbackService.goForwardHistory()" [disabled]="!canGoForward()">
                History Forward
            </button>
            <button class="nav-btn" (click)="playbackService.clearHistory()" [disabled]="playbackService.currentPlaylist().length === 0">
                Clear History
            </button>
            <button class="shuffle-btn" (click)="playbackService.toggleShuffle()">
                {{ isShuffled() ? 'Shuffle: ON' : 'Shuffle: OFF' }}
            </button>
        </div>
    </div>

    <app-track-list [tracks]="currentPlaylist()" [highlightId]="currentTrackId()"></app-track-list>
</div>
