<div class="background-box">
  <h1>Unclassified Tracks</h1>
  <button (click)="playAll()" [disabled]="tracks().length === 0" style="margin-bottom: 20px;">Play All</button>

  @if (tracks().length === 0) {
    <p>No unclassified tracks found or still loading...</p>
  } @else {
    <app-track-list [tracks]="tracks()" [highlightId]="currentTrackId()"></app-track-list>
  }
</div>
