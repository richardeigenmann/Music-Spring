<div class="background-box">
  <h1>Playlists</h1>
  <div class="playlists-container">
    <div class="playlist-list">
      <ul>
        @for (playlist of playlists(); track playlist.groupId) {
          <div>
            <a [routerLink]="['/group', playlist.groupId]">
              {{ playlist.groupName }} ({{ playlist.tracks }} tracks)
            </a>
          </div>
        }
      </ul>
    </div>
  </div>
</div>
