<div class="header-container">
  <div class="logo-section">
    <img src="assets/music_logo.gif" height="148" width="155" (click)="goHome()" style="cursor: pointer; vertical-align: top;">
  </div>
  <div class="content-section">
    <div class="title-row">
      <img src="assets/music_title.gif" height="87" width="592" (click)="goHome()" style="cursor: pointer; vertical-align: top;">
    </div>
    <div class="control-rectangle">
      <div class="search-and-groups">
        <input type="text" [placeholder]="'Search ' + totalTracks() + ' Tracks'" (keyup.enter)="performSearch($event)" class="search-input">

        <div class="hamburger-menu">
          <button (click)="toggleHamburgerMenu()" class="musicdb-button">☰ Menu</button>
          @if (showHamburgerMenu()) {
            <div class="menu-dropdown">
              <button routerLink="/mixer" (click)="closeHamburgerMenu()" class="menu-item">Mixing Board</button>
              <button routerLink="/stats" (click)="closeHamburgerMenu()" class="menu-item">Library Statistics</button>
              <button (click)="goUnclassified(); closeHamburgerMenu()" class="menu-item">Unclassified Tracks</button>
              <button routerLink="/status" (click)="closeHamburgerMenu()" class="menu-item">Status</button>
              <button (click)="startScan(); closeHamburgerMenu()" class="menu-item">Scan mp3 directory</button>
            </div>
          }
        </div>
      </div>
    </div>
  </div>

  @if (scanProgress(); as progress) {
    @if (!progress.done) {
      <div class="scan-progress-box">
        <div [title]="progress.currentFile">Scanning: {{ progress.currentFile }}</div>
        <div>Progress: {{ progress.checked }} / {{ progress.totalEstimated }} files</div>
        <div>Added: {{ progress.added }} new tracks</div>
        <div class="progress-bar-container">
          <div [style.width.%]="(progress.checked / (progress.totalEstimated || 1)) * 100" class="progress-bar"></div>
        </div>
      </div>
    }
  }
</div>

<router-outlet></router-outlet>
<app-track-player></app-track-player>
