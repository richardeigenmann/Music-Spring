# PostgreSQL connection for local development
spring.datasource.url=jdbc:postgresql://localhost:5432/musicdb
spring.datasource.username=musicuser
spring.datasource.password=musicpass

# Configuration for PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=musicdatabase
spring.datasource.hikari.connection-init-sql=SET search_path TO musicdatabase, public

# Path to local music folder for bootRun tasks
app.music-directory=/richi/mp3
